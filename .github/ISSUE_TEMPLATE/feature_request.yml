name: 功能建议
description: 建议一个改进或新能力
title: "[功能]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 这个改动要解决什么用户问题或运维问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望如何调整？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: textarea
    id: notes
    attributes:
      label: 补充信息
      description: 请不要包含真实密钥或个人账号数据。
